<h1>サイト概要</h1>

<p>当サイトは、CAEエンジニア（初心者）向けに、基本的な計算ツールを提供する個人運営サイトです。</p>

<p>梁のたわみ計算、断面特性計算、単位変換など、日々の設計・解析業務で役立つツールを無料で公開しています。</p>

<p>実務や学習で使いやすいシンプルなツールを目指し、随時機能の追加・改善を行っています。</p>

<p>また、経験から得た実務でのコツや失敗談なども、「CAEノート」としてまとめていく予定です。</p>

<p>さらに、CAEとは別に、趣味で得た知識や経験についても発信していきます。</p>

<p>運営者：Can’tnot（個人エンジニア）</p>
