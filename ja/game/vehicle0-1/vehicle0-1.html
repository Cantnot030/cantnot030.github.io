<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>エコドライブ</title>
<style>
body { margin:0; background:black; color:white; text-align:center;}
#ui { position:absolute; top:10px; left:10px;}
</style>
</head>

<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="speed">Speed: 0</div>
  <div id="rpm">RPM: 0</div>
  <div id="fuel">Fuel: 100</div>
  <div id="distance">Distance: 0</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let speed = 0;
let rpm = 0;
let fuel = 100;
let distance = 0;
let accel = false;

// アクセル
document.addEventListener("touchstart", () => accel = true);
document.addEventListener("touchend", () => accel = false);
document.addEventListener("mousedown", () => accel = true);
document.addEventListener("mouseup", () => accel = false);

function update(){
  if(accel){
    speed += 0.1;
    rpm += 50;
    fuel -= 0.05 * (rpm / 1000); // 回転数高いほど燃費悪い
  } else {
    speed *= 0.98;
    rpm *= 0.95;
  }

  if(speed < 0) speed = 0;
  if(rpm < 0) rpm = 0;

  distance += speed * 0.01;

  document.getElementById("speed").textContent = "Speed: " + speed.toFixed(1);
  document.getElementById("rpm").textContent = "RPM: " + Math.floor(rpm);
  document.getElementById("fuel").textContent = "Fuel: " + fuel.toFixed(1);
  document.getElementById("distance").textContent = "Distance: " + distance.toFixed(2);

  if(fuel <= 0){
    alert("ガス欠！");
    location.reload();
  }

  if(distance >= 5){
    let efficiency = distance / (100 - fuel);
    alert("到着！燃費: " + efficiency.toFixed(2));
    location.reload();
  }

  requestAnimationFrame(update);
}

update();
</script>
</body>
</html>
