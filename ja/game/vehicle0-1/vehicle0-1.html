<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>のんびりドライブ</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: skyblue;
}

#road {
  position: absolute;
  width: 100%;
  height: 200%;
  background: repeating-linear-gradient(
    #555,
    #555 40px,
    #666 40px,
    #666 80px
  );
}

#player {
  position: absolute;
  width: 50px;
  height: 80px;
  background: red;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>
<div id="road"></div>
<div id="player"></div>

<script>
const road = document.getElementById("road");
const player = document.getElementById("player");

let roadY = 0;
let playerX = window.innerWidth / 2 - 25;

// スクロール
function update() {
  roadY += 2;
  road.style.top = -roadY + "px";

  if (roadY > window.innerHeight) {
    roadY = 0;
  }

  player.style.left = playerX + "px";

  requestAnimationFrame(update);
}

// 操作（スワイプ対応）
document.addEventListener("touchmove", (e) => {
  playerX = e.touches[0].clientX - 25;
});

// PC用
document.addEventListener("mousemove", (e) => {
  playerX = e.clientX - 25;
});

update();
</script>
</body>
</html>
