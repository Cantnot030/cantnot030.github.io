 <body>

   <h1>要素品質チェッカー</h1>

   <p>csv形式で節点、要素情報を入力すると<br>
      要素品質を計算します。</p>


   <h3>節点（Node CSV）</h3>
<textarea id="nodeInput" rows="6" cols="30">
id,x,y
1,0,0
2,0,-10
3,0,-20
4,10,0
5,10,-15
6,10,-20
7,20,0
8,20,-12.5
9,20,-20
</textarea>

<h3>要素（Element CSV）</h3>
<textarea id="elemInput" rows="6" cols="30">
id,n1,n2,n3
1,1,2,3,4

</textarea>

<br>
<button onclick="drawMesh()">描画</button>

<br><br>
<canvas id="canvas" width="400" height="400" style="border:1px solid #ccc;"></canvas>





<script>

// ===== グローバル =====
let view = {
  scale: 1,
  offsetX: 0,
  offsetY: 0
};

let nodes = {};
let elems = {};
let lastDist = null;

// ===== 初期化（1回だけ）=====
window.onload = function(){
  setupInteraction();
};

// ===== メイン =====
function drawMesh(){
  nodes = parseNodes();
  elems = parseElems();
  drawCanvas(nodes, elems);
}

// ===== ノード =====
function parseNodes(){

  const text = document.getElementById("nodeInput").value;
  const lines = text.trim().split("\n");

  let nodes = {};

  for(let i=1; i<lines.length; i++){

    let [id, x, y] = lines[i].split(",").map(v => v.trim());

    if(isNaN(id) || isNaN(x) || isNaN(y)){
      alert("節点の入力形式が正しくありません");
      return {};
    }

    nodes[id] = {
      x: Number(x),
      y: Number(y)
    };
  }

  return nodes;
}

// ===== 要素 =====
function parseElems(){

  const text = document.getElementById("elemInput").value;
  const lines = text.trim().split("\n");

  let elems = [];

  for(let i=1; i<lines.length; i++){

    let [id, n1, n2, n3, n4] = lines[i].split(",").map(v => Number(v.trim()));

    if(isNaN(id) || isNaN(n1) || isNaN(n2) || isNaN(n3)){
      alert("要素の入力形式が正しくありません");
      return [];
    }

    if(isNaN(n4) || n3 == n4){
      elems.push({
        id,
        nodes: [n1, n2, n3]
      });
    }
    else {
      elems.push({
        id,
        nodes: [n1, n2, n3, n4]
      });
    }
    
  }

  return elems;
}

// ===== 描画 =====
function drawCanvas(nodes, elems){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let xs = Object.values(nodes).map(n => n.x);
  let ys = Object.values(nodes).map(n => n.y);

  let minX = Math.min(...xs);
  let maxX = Math.max(...xs);
  let minY = Math.min(...ys);
  let maxY = Math.max(...ys);

  let scaleX = canvas.width / (maxX - minX);
  let scaleY = canvas.height / (maxY - minY);
  let baseScale = Math.min(scaleX, scaleY) * 0.8;

  function toCanvas(x, y){

    let px = (x - minX) * baseScale;
    let py = (y - minY) * baseScale;

    // ズーム適用
    px = px * view.scale + view.offsetX + 20;
    py = py * view.scale + view.offsetY + 20;

    // Y反転
    py = canvas.height - py;

    return {px, py};
  }

  // 要素描画
  elems.forEach(e => {

    let n1 = nodes[e.nodes[0]];
    let n2 = nodes[e.nodes[1]];
    let n3 = nodes[e.nodes[2]];
    let n4 = nodes[e.nodes[3]];

    if(!n1 || !n2 || !n3) return;

    if(!n4){
     let p1 = toCanvas(n1.x, n1.y);
     let p2 = toCanvas(n2.x, n2.y);
     let p3 = toCanvas(n3.x, n3.y);

     ctx.beginPath();
     ctx.moveTo(p1.px, p1.py);
     ctx.lineTo(p2.px, p2.py);
     ctx.lineTo(p3.px, p3.py);
     ctx.closePath();
     ctx.stroke();
    } else {
     let p1 = toCanvas(n1.x, n1.y);
     let p2 = toCanvas(n2.x, n2.y);
     let p3 = toCanvas(n3.x, n3.y);
     let p4 = toCanvas(n4.x, n4.y);

     ctx.beginPath();
     ctx.moveTo(p1.px, p1.py);
     ctx.lineTo(p2.px, p2.py);
     ctx.lineTo(p3.px, p3.py);
     ctx.lineTo(p4.px, p4.py);
     ctx.closePath();
     ctx.stroke();
    }
  });

  // 節点描画
  Object.entries(nodes).forEach(([id, n]) => {
    let p = toCanvas(n.x, n.y);

    ctx.beginPath();
    ctx.arc(p.px, p.py, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillText(id, p.px + 5, p.py - 5);
  });
}

// ===== マウス操作、スマホタッチ設定 =====
function setupInteraction(){

  const canvas = document.getElementById("canvas");

//PCドラッグ
let isDragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e => {
  isDragging = true;
  lastX = e.offsetX;
  lastY = e.offsetY;
});

canvas.addEventListener("mousemove", e => {
  if(!isDragging) return;

  let dx = e.offsetX - lastX;
  let dy = - ( e.offsetY - lastY );

  view.offsetX += dx;
  view.offsetY += dy;

  lastX = e.offsetX;
  lastY = e.offsetY;

  drawCanvas(nodes, elems);
});

canvas.addEventListener("mouseup", () => {
  isDragging = false;
});

canvas.addEventListener("mouseleave", () => {
  isDragging = false;
});

//スマホスワイプ
let lastTouchX = 0;
let lastTouchY = 0;

canvas.addEventListener("touchstart", e => {
  if(e.touches.length === 1){
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  }
});

canvas.addEventListener("touchmove", e => {

  if(e.touches.length === 1){

    e.preventDefault();

    let x = e.touches[0].clientX;
    let y = e.touches[0].clientY;

    let dx = x - lastTouchX;
    let dy = - ( y - lastTouchY );

    view.offsetX += dx;
    view.offsetY += dy;

    lastTouchX = x;
    lastTouchY = y;

    drawCanvas(nodes, elems);
  }

}, { passive: false });


// PCホイール
canvas.addEventListener("wheel", function(e){
  e.preventDefault();

  const zoom = 1.1;

  const rect = canvas.getBoundingClientRect();

  // キャンバス中心
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  let prevScale = view.scale;

  if(e.deltaY < 0){
    view.scale *= zoom;
  }else{
    view.scale /= zoom;
  }

  let scaleRatio = view.scale / prevScale;

  // 中心を基準に補正
  view.offsetX = cx - (cx - view.offsetX) * scaleRatio;
  view.offsetY = cy - (cy - view.offsetY) * scaleRatio;

  drawCanvas(nodes, elems);

}, { passive: false });


//スマホズーム
canvas.addEventListener("touchmove", function(e){

  if(e.touches.length === 2){

    e.preventDefault();

    let dx = e.touches[0].clientX - e.touches[1].clientX;
    let dy = e.touches[0].clientY - e.touches[1].clientY;

    let dist = Math.sqrt(dx*dx + dy*dy);

    if(lastDist !== null){

      let prevScale = view.scale;
      let scaleChange = dist / lastDist;

      view.scale *= scaleChange;

      let scaleRatio = view.scale / prevScale;

      // 中心基準
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      view.offsetX = cx - (cx - view.offsetX) * scaleRatio;
      view.offsetY = cy - (cy - view.offsetY) * scaleRatio;

      drawCanvas(nodes, elems);
    }

    lastDist = dist;
  }

}, { passive: false });


  
  
    
    
    
    
    
    
    

  canvas.addEventListener("touchend", function(){
    lastDist = null;
  });
}

</script>
