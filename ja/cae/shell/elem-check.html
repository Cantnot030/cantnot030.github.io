 <head>

 <body>
  <div class="container">

   <h1>要素品質チェッカー</h1>

   <p>csv形式で節点、要素情報を入力すると<br>
      要素品質を計算します。</p>


   <h3>節点（Node CSV）</h3>
<textarea id="nodeInput" rows="6" cols="30">
id,x,y
1,0,0
2,0,-10
3,0,-20
4,10,0
5,10,-15
6,10,-20
7,20,0
8,20,-12.5
9,20,-20
</textarea>

<h3>要素（Element CSV）</h3>
<textarea id="elemInput" rows="6" cols="30">
id,n1,n2,n3
1,1,2,5,4
2,2,3,6,5
3,4,5,9,8
4,6,9,5
5,4,8,7

</textarea>

<br>
<button onclick="drawMesh()">描画</button>

<button onclick="resetView()">⛶</button>

<br><br>
<canvas id="canvas" width="400" height="400" style="border:1px solid #ccc;"></canvas>

<div id="result"></div>

<script src="/ja/cae/shell/js/calc-quality.js"></script>
<script src="/ja/cae/shell/js/setupInteraction.js"></script>

<script>

// ===== グローバル =====
let view = {
  scale: 1,
  offsetX: 0,
  offsetY: 0
};

let nodes = {};
let elems = {};
let lastDist = null;
let selectedElem = null;

let transform = {
  minX: 0,
  minY: 0,
  baseScale: 1
};

// ===== 初期化（1回だけ）=====
window.onload = function(){
  setupInteraction();
};

//フィット
function resetView(){
  view.scale = 1;
  view.offsetX = 0;
  view.offsetY = 0;

  drawCanvas(nodes, elems); // ←これでfit再計算される
}

// ===== メイン =====
function drawMesh(){
  nodes = parseNodes();
  elems = parseElems();
  
  calcQuality(nodes, elems);
  
  drawCanvas(nodes, elems);
  
  //showElemInfo(e);
}

// ===== ノード =====
function parseNodes(){

  const text = document.getElementById("nodeInput").value;
  const lines = text.trim().split("\n");

  let nodes = {};

  for(let i=1; i<lines.length; i++){

    let [id, x, y] = lines[i].split(",").map(v => v.trim());

    if(isNaN(id) || isNaN(x) || isNaN(y)){
      alert("節点の入力形式が正しくありません");
      return {};
    }

    nodes[id] = {
      x: Number(x),
      y: Number(y)
    };
  }

  return nodes;
}

// ===== 要素 =====
function parseElems(){

  const text = document.getElementById("elemInput").value;
  const lines = text.trim().split("\n");

  let elems = [];

  for(let i=1; i<lines.length; i++){

    let [id, n1, n2, n3, n4] = lines[i].split(",").map(v => Number(v.trim()));

    if(isNaN(id) || isNaN(n1) || isNaN(n2) || isNaN(n3)){
      alert("要素の入力形式が正しくありません");
      return [];
    }

    if(isNaN(n4) || n3 == n4){
      elems.push({
        id,
        nodes: [n1, n2, n3],
        quality: {
              minEdge: null,
              maxEdge: null,
              area: null,
              minAngle: null,
              maxAngle: null,
              aspect: null
        }
      });
    }
    else {
      elems.push({
        id,
        nodes: [n1, n2, n3, n4],
        quality: {
              minEdge: null,
              maxEdge: null,
              area: null,
              minAngle: null,
              maxAngle: null,
              aspect: null
        }
      });
    }
    
  }

  return elems;
}

//描画用パーツ
function toCanvas(x, y){

  const canvas = document.getElementById("canvas");

  let px = (x - transform.minX) * transform.baseScale;
  let py = (y - transform.minY) * transform.baseScale;

  px = px * view.scale + view.offsetX + 20;
  py = py * view.scale + view.offsetY + 20;

  py = canvas.height - py;

  return {px, py};
}

// ===== 描画 =====
function drawCanvas(nodes, elems){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let xs = Object.values(nodes).map(n => n.x);
  let ys = Object.values(nodes).map(n => n.y);

  let minX = Math.min(...xs);
  let maxX = Math.max(...xs);
  let minY = Math.min(...ys);
  let maxY = Math.max(...ys);

  let scaleX = canvas.width / (maxX - minX);
  let scaleY = canvas.height / (maxY - minY);
  let baseScale = Math.min(scaleX, scaleY) * 0.8;

  transform.minX = minX;
  transform.minY = minY;
  transform.baseScale = baseScale;
  
  /*
  function toCanvas(x, y){

    let px = (x - minX) * baseScale;
    let py = (y - minY) * baseScale;

    // ズーム適用
    px = px * view.scale + view.offsetX + 20;
    py = py * view.scale + view.offsetY + 20;

    // Y反転
    py = canvas.height - py;

    return {px, py};
  }
*/
  
  
  // 要素描画
  elems.forEach(e => {

    let n1 = nodes[e.nodes[0]];
    let n2 = nodes[e.nodes[1]];
    let n3 = nodes[e.nodes[2]];
    let n4 = nodes[e.nodes[3]];

    if(!n1 || !n2 || !n3) return;

    if(!n4){
     let p1 = toCanvas(n1.x, n1.y);
     let p2 = toCanvas(n2.x, n2.y);
     let p3 = toCanvas(n3.x, n3.y);

     ctx.beginPath();
     ctx.moveTo(p1.px, p1.py);
     ctx.lineTo(p2.px, p2.py);
     ctx.lineTo(p3.px, p3.py);
     ctx.closePath();
     ctx.stroke();
    } else {
     let p1 = toCanvas(n1.x, n1.y);
     let p2 = toCanvas(n2.x, n2.y);
     let p3 = toCanvas(n3.x, n3.y);
     let p4 = toCanvas(n4.x, n4.y);

     ctx.beginPath();
     ctx.moveTo(p1.px, p1.py);
     ctx.lineTo(p2.px, p2.py);
     ctx.lineTo(p3.px, p3.py);
     ctx.lineTo(p4.px, p4.py);
     ctx.closePath();
     ctx.stroke();
    }
  
    //選択要素色塗り
    if(e === selectedElem){
      ctx.fillStyle = "rgba(255,0,0,0.2)";
      ctx.fill();
      //ctx.strokeStyle = "red";
      //ctx.lineWidth = 2;
      //ctx.stroke();
    } else {
      ctx.fillStyle = "rgba(0,0,0,0)";
      ctx.fill();
      //ctx.strokeStyle = "black";
      //ctx.lineWidth = 1;
      //ctx.stroke();
    }
  });

  ctx.fillStyle = "black";

  // 節点描画
  Object.entries(nodes).forEach(([id, n]) => {
    let p = toCanvas(n.x, n.y);

    ctx.beginPath();
    ctx.arc(p.px, p.py, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillText(id, p.px + 5, p.py - 5);
  });
}

// 要素品質計算
function calcQuality(nodes, elems){

  elems.forEach(e => {

    let pts = e.nodes.map(id => nodes[id]).filter(n => n);

    if(pts.length < 3) return;

    // 面積
    e.quality.area = calcArea(pts);

    // 辺長
    e.quality.minEdge = calcMinEdge(pts);
    e.quality.maxEdge = calcMaxEdge(pts);




    // 辺長
/*
    let edges = calcEdges(pts);
    e.quality.minEdge = Math.min(...edges);
    e.quality.maxEdge = Math.max(...edges);
*/

    // アスペクト比
//    e.quality.aspect = e.quality.maxEdge / e.quality.minEdge;

    // 角度
/*
    let angles = calcAngles(pts);
    e.quality.minAngle = Math.min(...angles);
    e.quality.maxAngle = Math.max(...angles);
*/

  });

}

  elems.forEach(e => {

    `;
  });

  document.getElementById("result").innerHTML = html;
}
*/

function showElemInfo(e){

  document.getElementById("result").innerHTML = `
    <h3>選択要素</h3>
    ID : ${e.id}<br>
    面積 : ${e.quality.area.toFixed(2)}<br>
    最短辺 : ${e.quality.minEdge.toFixed(2)}<br>
    最長辺 : ${e.quality.maxEdge.toFixed(2)}
  `;
}


</script>
