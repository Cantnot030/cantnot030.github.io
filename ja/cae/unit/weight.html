 <body>
  <div class="container">
    
   <!-- パンくず -->

    <a href="/">Top</a> &gt;

   <h1>重さ単位変換</h1>

   <p>値を入力し、単位と数値表示形式を選択してください。</p>

   <input type="number" id="value" placeholder="数値">

   <select id="unit">
    <option value="mg">mg</option>  
    <option value="g">g</option>
    <option value="kg">kg</option>
    <option value="lb">lb</option>
    <option value="oz">oz</option>
   </select>

   <select id="digits">
    <option value="auto">自動表示</option>  
    <option value="e">指数表示</option>
   </select>
   <br>
   <button onclick="convert()">変換</button>

   <div class="result" id="result"></div>

   <script src="/js/unit-converter.js"></script>

   <script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;
let digits = document.getElementById("digits").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let kgram;

switch(unit){ 

case "kg":
kgram = value;
break;

case "g":
kgram = value / 1000;
break;

case "mg":
kgram = value / 1000000;
break;

case "lb":
kgram = value / 2.20462;
break;

case "oz":
kgram = value / 35.274;
break;

}

let g = kgram * 1000;
let mg = kgram * 1000000;
let lb = kgram * 2.20462;
let oz = kgram * 35.274;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

mg : ${formatSmart(mg,digits)} <br>
g : ${formatSmart(g,digits)} <br>
kg : ${formatSmart(kgram,digits)} <br>
lb : ${formatSmart(lb,digits)} <br>
oz : ${formatSmart(oz,digits)} <br>

`;

}
   </script>
