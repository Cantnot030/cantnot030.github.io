 <body>
  <div class="container">
   <!-- パンくず -->
   <nav class="breadcrumb">
    <a href="/">Top</a> &gt;

    <span>長さ単位変換</span>
   </nav>

   <h1>長さ単位変換</h1>

   <p>値を入力し、単位と数値表示形式を選択してください。</p>

   <input type="number" id="value" placeholder="数値">

   <select id="unit">
    <option value="Å">Å</option>
    <option value="nm">nm</option>
    <option value="μm">μm</option>
    <option value="mm">mm</option>
    <option value="cm">cm</option>
    <option value="m">m</option>
    <option value="km">km</option>
    <option value="yard">yard</option>
    <option value="mile">mile</option>
    <option value="inch">inch</option>
    <option value="ft">ft</option>
   </select>

   <select id="digits">
    <option value="auto">自動表示</option>  
    <option value="e">指数表示</option>
   </select>
   <br>
   <button onclick="convert()">変換</button>

   <div class="result" id="result"></div>

   <script src="/js/unit-converter.js"></script>

   <script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;
let digits = document.getElementById("digits").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let meter;

switch(unit){

case "Å":
meter = value / 10000000000;
break;

case "nm":
meter = value / 1000000000;
break;

case "μm":
meter = value / 1000000;
break;

case "mm":
meter = value / 1000;
break;

case "cm":
meter = value / 100;
break;

case "m":
meter = value;
break;

case "km":
meter = value * 1000;
break;

case "yard":
meter = value * 0.9144;
break;

case "mile":
meter = value * 1609.344;
break;

case "inch":
meter = value * 0.0254;
break;

case "ft":
meter = value * 0.3048;
break;

}

let A = meter * 10000000000;
let nm = meter * 1000000000;
let microm = meter * 1000000;
let mm = meter * 1000;
let cm = meter * 100;
let km = meter / 1000;
let yard = meter / 0.9144;
let mile = meter / 1609.344;
let inch = meter / 0.0254;
let ft = meter / 0.3048;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

Å : ${formatSmart(A,digits)} <br>
nm : ${formatSmart(nm,digits)} <br>
μm : ${formatSmart(microm,digits)} <br>
mm : ${formatSmart(mm,digits)} <br>
cm : ${formatSmart(cm,digits)} <br>
m : ${formatSmart(meter,digits)} <br>
km : ${formatSmart(km,digits)} <br>
yard : ${formatSmart(yard,digits)} <br>
mile : ${formatSmart(mile,digits)} <br>
inch : ${formatSmart(inch,digits)} <br>
ft : ${formatSmart(ft,digits)}

`;

}
   </script>
