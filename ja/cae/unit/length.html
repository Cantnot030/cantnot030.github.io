<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>長さ単位変換 | Length Unit Converter</title>

<style>
body{
font-family: Arial;
max-width:600px;
margin:auto;
padding:20px;
}

input, select, button{
padding:8px;
margin:5px;
font-size:16px;
}

.result{
margin-top:20px;
padding:10px;
background:#f5f5f5;
}
</style>

</head>
<body>

<h1>長さ単位変換</h1>

<p>値を入力し、単位を選択してください。</p>

<input type="number" id="value" placeholder="数値">

<select id="unit">
<option value="mm">mm</option>
<option value="cm">cm</option>
<option value="m">m</option>
<option value="km">km</option>
<option value="inch">inch</option>
<option value="ft">ft</option>
</select>

<button onclick="convert()">変換</button>

<div class="result" id="result"></div>

<script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let meter;

switch(unit){

case "mm":
meter = value / 1000;
break;

case "cm":
meter = value / 100;
break;

case "m":
meter = value;
break;

case "km":
meter = value * 1000;
break;

case "inch":
meter = value * 0.0254;
break;

case "ft":
meter = value * 0.3048;
break;

}

let mm = meter * 1000;
let cm = meter * 100;
let km = meter / 1000;
let inch = meter / 0.0254;
let ft = meter / 0.3048;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

mm : ${mm.toFixed(4)} <br>
cm : ${cm.toFixed(4)} <br>
m : ${meter.toFixed(4)} <br>
km : ${km.toFixed(6)} <br>
inch : ${inch.toFixed(4)} <br>
ft : ${ft.toFixed(4)}

`;

}

</script>

</body>
</html>
