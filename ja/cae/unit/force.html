   <h1>力単位変換</h1>
  
   <h2>力の単位について</h2>
   <p>力はN（ニュートン）がSI単位として使用されますが、kgf（キログラム重）も現場ではよく使われます。</p>

   <p>値を入力し、単位と数値表示形式を選択してください。</p>

   <input type="number" id="value" placeholder="数値">

   <select id="unit">
    <option value="N">N</option>  
    <option value="kN">kN</option>
    <option value="MN">MN</option>
    <option value="mN">mN</option>
    <option value="kgf">kgf</option>
    <option value="gf">gf</option>
    <option value="tf">tf</option>
    <option value="lbf">lbf</option>
    <option value="kip">kip</option>
    <option value="ozf">ozf</option>
    <option value="dyn">dyn</option>
   </select>

   <select id="digits">
    <option value="auto">自動表示</option>  
    <option value="e">指数表示</option>
   </select>
   <br>
   <button onclick="convert()">変換</button>

   <div class="result" id="result"></div>

   <script src="/js/unit-converter.js"></script>

   <script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;
let digits = document.getElementById("digits").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let newton;

switch(unit){ 

case "N":
newton = value;
break;

case "kN":
newton = value * 1000;
break;

case "MN":
newton = value * 1000000;
break;

case "mN":
newton = value / 1000;
break;

case "kgf":
newton = value * 9.80665;
break;

case "gf":
newton = value * 0.00980665;
break;

case "tf":
newton = value * 9806.65;
break;

case "lbf":
newton = value * 4.44822;
break;

case "kip":
newton = value * 4448.22;
break;

case "ozf":
newton = value * 0.2780139;
break;

case "dyn":
newton = value * 0.00001;
break;

}

// 各単位へ変換
let kN = newton / 1000;
let MN = newton / 1000000;
let mN = newton * 1000;
let kgf = newton / 9.80665;
let gf = newton / 0.00980665;
let tf = newton / 9806.65;
let lbf = newton / 4.44822;
let kip = newton / 4448.22;
let ozf = newton / 0.2780139;
let dyn = newton / 0.00001;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

N : ${formatSmart(newton,digits)} <br>
kN : ${formatSmart(kN,digits)} <br>
MN : ${formatSmart(MN,digits)} <br>
mN : ${formatSmart(mN,digits)} <br>
kgf : ${formatSmart(kgf,digits)} <br>
gf : ${formatSmart(gf,digits)} <br>
tf : ${formatSmart(tf,digits)} <br>
lbf : ${formatSmart(lbf,digits)} <br>
kip : ${formatSmart(kip,digits)} <br>
ozf : ${formatSmart(ozf,digits)} <br>
dyn : ${formatSmart(dyn,digits)} <br>

`;

}
   </script>
