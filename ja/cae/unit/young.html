   <h1>ヤング率（縦弾性係数）単位変換</h1>
   <p>本ツールはヤング率のほか、せん断弾性係数など<br>
      同じ単位（Pa）を持つ物理量にも利用できます。<br>
      値を入力し、単位と数値表示形式を選択してください。</p>

   <input type="number" id="value" placeholder="数値">

   <select id="unit">
    <option value="Pa">Pa</option>  
    <option value="kPa">kPa</option>
    <option value="MPa">MPa</option>
    <option value="GPa">GPa</option>
    <option value="Nmm2">N/mm²</option>
    <option value="Nm2">N/m²</option>
    <option value="kNmm2">kN/mm²</option>
    <option value="kNm2">kN/m²</option>
<!--    <option value="kgfcm2">kgf/cm²</option>
    <option value="kgfmm2">kgf/mm²</option> -->
    <option value="psi">psi</option>
    <option value="ksi">ksi</option>
   </select>

   <select id="digits">
    <option value="auto">自動表示</option>  
    <option value="e">指数表示</option>
   </select>
   <br>
   <button onclick="convert()">変換</button>

   <div class="result" id="result"></div>

   <script src="/js/unit-converter.js"></script>

   <script>

function convert(){

let value = parseFloat(document.getElementById("value").value);
let unit = document.getElementById("unit").value;
let digits = document.getElementById("digits").value;

if(isNaN(value)){
document.getElementById("result").innerHTML = "数値を入力してください";
return;
}

let pascal;

switch(unit){ 

case "Pa":
pascal = value;
break;

case "kPa":
pascal = value * 1000;
break;

case "MPa":
pascal = value * 1000000;
break;

case "GPa":
pascal = value * 1000000000;
break;

case "Nmm2":
pascal = value * 1000000;
break;

case "Nm2":
pascal = value;
break;

case "kNmm2":
pascal = value * 1000000000;
break;

case "kNm2":
pascal = value * 1000;
break;
/*
case "kgfcm2":
pascal = value * 98066.5;
break;

case "kgfmm2":
pascal = value * 9806650;
break;
*/
case "psi":
pascal = value * 6894.757;
break;

case "ksi":
pascal = value * 6894757;
break;

}

let kPa = pascal / 1000;
let MPa = pascal / 1000000;
let GPa = pascal / 1000000000;
let Nmm2 = pascal / 1000000;
let Nm2 = pascal;
let kNmm2 = pascal / 1000000000;
let kNm2 = pascal / 1000;
/*
let kgfcm2 = pascal / 98066.5;
let kgfmm2 = pascal / 9806650;
*/
let psi = pascal / 6894.757;
let ksi = pascal / 6894757;

document.getElementById("result").innerHTML = `
<h3>変換結果</h3>

Pa : ${formatSmart(pascal,digits)} <br>
kPa : ${formatSmart(kPa,digits)} <br>
MPa : ${formatSmart(MPa,digits)} <br>
GPa : ${formatSmart(GPa,digits)} <br>
N/mm<sup>2</sup> : ${formatSmart(Nmm2,digits)} <br>
N/m<sup>2</sup> : ${formatSmart(Nm2,digits)} <br>
kN/mm<sup>2</sup> : ${formatSmart(kNmm2,digits)} <br>
kN/m<sup>2</sup> : ${formatSmart(kNm2,digits)} <br>
psi : ${formatSmart(psi,digits)} <br>
ksi : ${formatSmart(ksi,digits)} <br>

`;

}
   </script>
