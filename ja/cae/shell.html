<h1>平面要素ツール</h1>

<p>
二次元平面要素に関連する計算ツール置き場です。<br>
<br>
要素品質チェッカーは節点情報、要素構成をcsv形式で入力し、<br>
要素面積やアスペクト比、頂点角度等を求めます。
</p>

<h2>平面要素とは</h2>
<p>
平面要素とは、構造物や部品を小さな要素に分割し、
それぞれの要素の挙動を計算することで全体の挙動を求める手法です。
主に二次元問題の解析に用いられ、応力や変形の分布を確認することができます。
</p>

<br>

<ul>
