   <h1>要素品質チェッカー</h1>

   <p>csv形式で節点、要素情報を入力すると<br>
      要素品質を計算します。</p>


   <h3>節点（Node CSV）</h3>
<textarea id="nodeInput" rows="6" cols="30">
id,x,y
1,0,0
2,100,0
3,100,100
4,0,100
</textarea>

<h3>要素（Element CSV）</h3>
<textarea id="elemInput" rows="6" cols="30">
id,n1,n2,n3
1,1,2,3
2,1,3,4
</textarea>

<br>
<button onclick="drawMesh()">描画</button>

<br><br>
<canvas id="canvas" width="400" height="400" style="border:1px solid #ccc;"></canvas>


<script>
function drawMesh(){

  let nodes = parseNodes();
  let elems = parseElems();

  drawCanvas(nodes, elems);
}
   
  function parseNodes(){

  const text = document.getElementById("nodeInput").value;
  const lines = text.trim().split("\n");

  let nodes = {};

  lines.forEach((line, index) => {
    if(index === 0) return;

    let [id, x, y] = line.split(",").map(v => v.trim());

    nodes[id] = {
      x: Number(x),
      y: Number(y)
    };
  });
  
  if(isNaN(id) || isNaN(x) || isNaN(y)){
  alert("入力形式が正しくありません");
  return;
}
  
  return nodes;
}

function parseElems(){

  const text = document.getElementById("elemInput").value;
  const lines = text.trim().split("\n");

  let elems = [];

  lines.forEach((line, index) => {
    if(index === 0) return;

    let [id, n1, n2, n3] = line.split(",").map(v => Number(v.trim()));

    elems.push({
      id,
      nodes: [n1, n2, n3]
    });
  });

if(isNaN(id) || isNaN(n1) || isNaN(n2)|| isNaN(n3)){
  alert("入力形式が正しくありません");
  return;
}


  return elems;
}

function drawCanvas(nodes, elems){

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // スケール計算
  let xs = Object.values(nodes).map(n => n.x);
  let ys = Object.values(nodes).map(n => n.y);

  let minX = Math.min(...xs);
  let maxX = Math.max(...xs);
  let minY = Math.min(...ys);
  let maxY = Math.max(...ys);

  let scaleX = canvas.width / (maxX - minX);
  let scaleY = canvas.height / (maxY - minY);
  let scale = Math.min(scaleX, scaleY) * 0.8;

  function toCanvas(x, y){
    let px = (x - minX) * scale + 20;
    let py = canvas.height - ((y - minY) * scale + 20);
    return {px, py};
  }

  // 三角形描画
  elems.forEach(e => {

    let n1 = nodes[e.nodes[0]];
    let n2 = nodes[e.nodes[1]];
    let n3 = nodes[e.nodes[2]];

    if(!n1 || !n2 || !n3) return;

    let p1 = toCanvas(n1.x, n1.y);
    let p2 = toCanvas(n2.x, n2.y);
    let p3 = toCanvas(n3.x, n3.y);

    ctx.beginPath();
    ctx.moveTo(p1.px, p1.py);
    ctx.lineTo(p2.px, p2.py);
    ctx.lineTo(p3.px, p3.py);
    ctx.closePath();

    ctx.stroke();
  });

  // 節点も描画
  Object.entries(nodes).forEach(([id, n]) => {
    let p = toCanvas(n.x, n.y);

    ctx.beginPath();
    ctx.arc(p.px, p.py, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillText(id, p.px + 5, p.py - 5);
  });
}
</script>
