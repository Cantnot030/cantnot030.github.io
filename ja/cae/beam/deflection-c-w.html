<html lang="ja">

 <head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/css/beam-def.css">
  <title>片持ち梁（等分布荷重）</title>
 </head>

 <body>
  <div class="container">
   <!-- パンくず -->
   <nav class="breadcrumb">
    <a href="/">Top</a> &gt;
    <a href="/ja/cae/cae-tools.html">CAEツール</a> &gt;
    <a href="/ja/cae/beam.html">梁計算ツール</a> &gt;
    <a href="/ja/cae/beam/deflection-list.html">梁のたわみ公式一覧</a> &gt;
    <span>片持ち梁（等分布荷重）</span>
   </nav>

   <h1>片持ち梁（等分布荷重）</h1>

   <div style="text-align:center;">
    <img src="/svg/beam-def-c-w.svg" width="600">
    <h2>δ = wL⁴ / 8EI</h2>
   </div>

   <div class="bw">
    <div class="left">
     <label>分布荷重 w (N/m)</label><br>
     <input id="w" type="number"><br>

     <label>梁長さ L (m)</label><br>
     <input id="L" type="number"><br>

     <label>ヤング率 E (Pa)</label><br>
     <input id="E" type="number"><br>

     <label>断面2次モーメント I (m⁴)</label><br>
     <input id="I" type="number"><br>

     <button onclick="calc()">計算</button>

     <h3 id="result"></h3>
    </div>

    <div class="right">
     <h4>関連ツール</h4>
     <ul>
      <li>
       <a href="/ja/cae/unit/unit-converter.html">単位変換</a>
       <p>入力単位に変換</p>
      </li>
      <li>
       <a href="/ja/cae/beam/section-prop.html">断面特性計算ツール</a>
       <p>断面2次モーメント算定</p>
      </li>
     </ul>
    </div>
   </div>
  </div>

  <script>

function calc(){

let w = parseFloat(document.getElementById("w").value);
let L = parseFloat(document.getElementById("L").value);
let E = parseFloat(document.getElementById("E").value);
let I = parseFloat(document.getElementById("I").value);

let delta = (w*Math.pow(L,4))/(8*E*I);

document.getElementById("result").innerHTML =
"最大たわみ = " + delta.toExponential(3) + " m";

}

  </script>

 </body>
</html>
