<!DOCTYPE html>
<html lang="ja">
 <head>
  <meta charset="UTF-8">
   <link rel="stylesheet" href="/css/style.css">
   <link rel="stylesheet" href="/css/breadcrumb.css">
   <link rel="stylesheet" href="/css/section-prop.css">
   <title>断面描画テスト</title>
   <!-- Google AdSenseコード -->
   <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9353484227417299"
     crossorigin="anonymous"></script>
   <style>
  svg {
    border: 1px solid #ccc;
    width: 400px;
    height: 400px;
  }
  textarea {
    width: 400px;
    height: 120px;
  }
   </style>
  </head>

  <body>

<h3>座標入力 (x,y)</h3>
<textarea id="input">
0,0
100,0
100,50
0,50
</textarea><br>

<button onclick="draw()">描画</button>

<svg id="canvas"></svg>


<h4 id="result"></h4>


<script>
function draw() {
  const text = document.getElementById("input").value.trim();
  const lines = text.split("\n");
  
  // バウンディングボックス計算
  let minX = Infinity, maxX = -Infinity;
  let minY = Infinity, maxY = -Infinity;

  // 座標配列
  let points = [];

  for (let line of lines) {
    let [x, y] = line.split(",").map(Number);
    points.push({x, y});
  }

  for (let p of points) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }

  // SVGサイズ
  const svgSize = 400;
  const margin = 40;

  // スケール（縦横フィット）
  let scaleX = (svgSize - margin * 2) / (maxX - minX);
  let scaleY = (svgSize - margin * 2) / (maxY - minY);
  let scale = Math.min(scaleX, scaleY);

  let width = (maxX - minX) * scale;
  let height = (maxY - minY) * scale;

  // 中央寄せ
  let offsetX = (svgSize - width) / 2 - minX * scale;
  let offsetY = (svgSize - height) / 2 - minY * scale;


  // オフセット（中央寄せ）
  //let offsetX = -minX * scale + margin;
  //let offsetY = -minY * scale + margin;
  
  const svg = document.getElementById("canvas");
  svg.innerHTML = "";

  // スケール調整（簡易）
  //const scale = 3;
  //const offset = 50;

  // polygon用文字列
  let pointStr = points.map(p => {
    let sx = p.x * scale + offsetX;
    let sy = svgSize - (p.y * scale + offsetY);    
    //let sx = p.x * scale + offset;
    //let sy = 300 - (p.y * scale + offset); // y反転
    return `${sx},${sy}`;
  }).join(" ");

  // ポリゴン描画
  const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
  polygon.setAttribute("points", pointStr);
  polygon.setAttribute("fill", "lightblue");
  polygon.setAttribute("stroke", "black");
  svg.appendChild(polygon);

  // 点描画
  for (let p of points) {
    let cx = p.x * scale + offsetX;
    let cy = svgSize - (p.y * scale + offsetY);

    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("cx", cx);
    circle.setAttribute("cy", cy);
    circle.setAttribute("r", 3);
    circle.setAttribute("fill", "red");

    svg.appendChild(circle);
  }
  
  //断面特性計算
  let prop = [];
  for (let i = 0; i < points.length - 1; i++) {
    prop[i] = [];
    //面積
    prop[i][1] = (points[i].x * points[i+1].y)-(points[i+1].x * points[i].y);
    //重心y
    prop[i][2] = (points[i].y + points[i+1].y) * (points[i].x * points[i+1].y - points[i+1].x * points[i].y);
    //Ix0
    prop[i][3] = (points[i].y * points[i].y + points[i].y * points[i+1].y + points[i+1].y * points[i+1].y) * (points[i].x * points[i+1].y - points[i+1].x * points[i].y);
  }
  let last = points.length-1;
  prop[last] = [];
  prop[last][1] = (points[last].x * points[0].y)-(points[0].x * points[last].y);
  prop[last][2] = (points[last].y + points[0].y) * (points[last].x * points[0].y - points[0].x * points[last].y);
  prop[last][3] = (points[last].y * points[last].y + points[last].y * points[0].y + points[0].y * points[0].y) * (points[last].x * points[0].y - points[0].x * points[last].y);
  
  let Asum = 0;
  let YCsum = 0;
  let IX0sum = 0;
  
  for (let i = 0; i < points.length; i++) {
    Asum += prop[i][1];
    YCsum += prop[i][2];
    IX0sum += prop[i][3];
  }
  
  let A = Math.abs(Asum) / 2;
  let Yc = YCsum / A / 6;
  let Ix = IX0sum / 12 - A * Yc * Yc;
  
  document.getElementById("result").innerHTML =
    "面積: " + A + "<br>" +
    "重心Y: " + Yc + "<br>" +
    "断面二次モーメントIx: " + Ix;
  
  // 重心Yのライン描画
  let yLine = svgSize - (Yc * scale + offsetY);

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", 0);
  line.setAttribute("x2", svgSize);
  line.setAttribute("y1", yLine);
  line.setAttribute("y2", yLine);

  // 破線
  line.setAttribute("stroke", "red");
  line.setAttribute("stroke-dasharray", "5,5");
  line.setAttribute("stroke-width", "1");

  svg.appendChild(line);
  
}
</script>

</body>
</html>
