   <h1>単純支持梁（中央集中荷重）</h1>

   <h2>このツールについて</h2>
   <p>本</p>

   <h2>両端固定梁（等分布荷重）とは</h2>
   <p>されます。</p>




   <div style="text-align:center;">
    <img src="/svg/beam-def-s-p.svg" width="600">
    <h2>δ = PL³ / 48EI</h2>
   </div>

   <div class="bw">
    <div class="left">
     <label>荷重 P (N)</label><br>
     <input id="P" type="number"><br>

     <label>梁長さ L (m)</label><br>
     <input id="L" type="number"><br>

     <label>ヤング率 E (Pa)</label><br>
     <input id="E" type="number"><br>

     <label>断面2次モーメント I (m⁴)</label><br>
     <input id="I" type="number"><br>

     <button onclick="calc()">計算</button>

     <h3 id="result"></h3>
    </div>
  
    <div class="right">
     <h4>関連ツール</h4>
     <ul>
      <li>
       <a href="/ja/cae/elastic-modulus.html">弾性係数（E,G,ν,K）相互変換</a>
       <p>E(ヤング率)を算定</p>
      </li>
      <li>
       <a href="/ja/cae/unit/unit-converter.html">単位変換</a>
       <p>入力単位に変換</p>
      </li>
      <li>
       <a href="/ja/cae/beam/section-prop.html">断面特性計算ツール</a>
       <p>断面2次モーメント算定</p>
      </li>
     </ul>
    </div>
   </div>
  
  </div>

  <script>

function calc(){

let P = parseFloat(document.getElementById("P").value);
let L = parseFloat(document.getElementById("L").value);
let E = parseFloat(document.getElementById("E").value);
let I = parseFloat(document.getElementById("I").value);

let delta = (P*Math.pow(L,3))/(48*E*I);

document.getElementById("result").innerHTML =
"最大たわみ = " + delta.toExponential(3) + " m";

}

  </script>
