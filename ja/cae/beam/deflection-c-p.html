  <style>
body{
font-family:Arial;
margin:40px;
}

input{
margin:5px;
padding:5px;
}

.bw {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.left {
  width: 50%;
  margin-left: 100px;
}

.right {
  width: 50%;
/*margin-left: 50px;*/
  border: 1px solid #ccc;  /* 枠線 */
  padding: 15px;           /* 内側の余白 */
  border-radius: 8px;      /* 角丸 */
}

  </style>
 </head>

 <body>
  <div class="container">

   <!-- パンくず -->
   <nav class="breadcrumb">
    <a href="/">Top</a> &gt;
    <a href="/ja/cae/cae-tools.html">CAEツール</a> &gt;
    <a href="/ja/cae/beam.html">梁計算ツール</a> &gt;
    <a href="/ja/cae/beam/deflection-list.html">梁のたわみ公式一覧</a> &gt;
    <span>片持ち梁（先端集中荷重）</span>
   </nav>

   <h1>片持ち梁（先端集中荷重）</h1>

   <div style="text-align:center;">
    <img src="/svg/beam-def-c-p.svg" width="600">
    <h2>δ = PL³ / 3EI</h2>
   </div>


   <div class="bw">
    <div class="left">

   <label>荷重 P (N)</label><br>
   <input id="P" type="number"><br>

   <label>梁長さ L (m)</label><br>
   <input id="L" type="number"><br>

   <label>ヤング率 E (Pa)</label><br>
   <input id="E" type="number"><br>

   <label>断面2次モーメント I (m⁴)</label><br>
   <input id="I" type="number"><br>

   <button onclick="calc()">計算</button>

   <h3 id="result"></h3>
  
   </div>
  
   <div class="right">
    <h4>関連ツール</h4>
    <ul>
     <li><a href="/ja/cae/unit/unit-converter.html">単位変換</a></li>
     <li><a href="/ja/cae/beam/section-prop.html">断面特性計算ツール</a></li>
    </ul>
   </div>
  </div>
  
  
  </div>

  <script>

function calc(){

let P = parseFloat(document.getElementById("P").value);
let L = parseFloat(document.getElementById("L").value);
let E = parseFloat(document.getElementById("E").value);
let I = parseFloat(document.getElementById("I").value);

let delta = (P*Math.pow(L,3))/(3*E*I);

document.getElementById("result").innerHTML =
"最大たわみ = " + delta.toExponential(3) + " m";

}
  </script>
