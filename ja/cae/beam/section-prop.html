<html lang="ja">
 <head>

  <link rel="stylesheet" href="/css/section-prop.css">
  <title>断面特性計算ツール</title>

  <style>
body{
font-family:Arial;
margin:40px;
}

input{
margin:5px;
padding:5px;
}

label {
display: inline-block;
width: 60px;
text-align: right;
}
  </style>
 </head>

 <body onload="drawRect()">
  <div class="container">
   <!-- パンくず -->
   <nav class="breadcrumb">
    <a href="/">Top</a> &gt;
    <a href="/ja/cae/cae-tools.html">CAEツール</a> &gt;
    <a href="/ja/cae/beam.html">梁計算ツール</a> &gt;
    <span>断面特性計算ツール</span>
   </nav>

   <h1>断面特性計算ツール</h1>

<p>断面形状を選択し各種寸法から<br>
断面特性を計算します。</p>

   <h2>断面形状</h2>

   <select id="shape" onchange="changeShape()">
    <option value="rect">矩形</option>
    <option value="circle">円</option>
    <option value="pipe">中空円</option>
    <option value="hbeam">H鋼</option>
   </select>
  
   <select id="unit" onchange="setUnits()">
    <option value="mm">mm</option>
    <option value="m">m</option>
   </select>

   <svg id="sectionSVG" width="300" height="300"></svg>
<!--   <body onload="drawRect()"> -->

   <!-- 矩形 -->
   <div id="rectInputs">
    <label>b</label>
    <input type="number" id="b">
    <br>
    <label>h</label>
    <input type="number" id="h">
   </div>

   <!-- 円 -->
   <div id="circleInputs" style="display:none;">
    <label>d</label>
    <input type="number" id="d">
   </div>

   <!-- 中空円 -->
   <div id="pipeInputs" style="display:none;">
    <label>D</label>
    <input type="number" id="D">
    <br>
    <label>d</label>
    <input type="number" id="d2">
   </div>

   <!-- H鋼 -->
   <div id="hbeamInputs" style="display:none;">
    <label>B</label>
    <input type="number" id="B">
    <br>
    <label>H</label>
    <input type="number" id="H">
    <br>
    <label>tf</label>
    <input type="number" id="tf">
    <br>
    <label>tw</label>
    <input type="number" id="tw">
   </div>

   <button onclick="calculate()">計算</button>

   <script src="/js/section-prop.js"></script>

<!--   <p id="result"></p> -->
  
   <p>
    <label>A = </label>
    <span id="A_val">-</span>
    <span id="A_unit"> mm²</span>
    <button onclick="copyText('A_val')">コピー</button><br>

    <label>Ix = </label>
    <span id="Ix_val">-</span>
    <span id="Ix_unit"> mm⁴</span>
    <button onclick="copyText('Ix_val')">コピー</button><br>

    <label>Zx = </label>
    <span id="Zx_val">-</span>
    <span id="Zx_unit"> mm³</span>
    <button onclick="copyText('Zx_val')">コピー</button>
   </p>

  </div>

 </body>
</html>
